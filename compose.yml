services:
  db_auth:
    build:
      context: ./db/auth
    environment:
      MYSQL_ROOT_PASSWORD: toor
      MYSQL_DATABASE: auth
      MYSQL_USER: app
      MYSQL_PASSWORD: ppa
    ports:
      - "3307:3306"
    volumes:
      - auth_db_data:/var/lib/mysql
    networks: [app_net]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  auth_service:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    environment:
      MYSQL_HOST: db_auth
      MYSQL_PORT: 3306
      MYSQL_USER: app
      MYSQL_PSWD: ppa
      MYSQL_DATABASE: auth
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      db_auth:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:5000/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [app_net]
    restart: unless-stopped

  log_ingestion_service:
    build:
      context: ./log_ingestion_service
      dockerfile: Dockerfile
    environment:
      LOG_INGESTION_HTTP_HOST: 0.0.0.0
      LOG_INGESTION_HTTP_PORT: 8001
      LOG_INGESTION_GRPC_HOST: 0.0.0.0
      LOG_INGESTION_GRPC_PORT: 50051
      LOG_INGESTION_MAX_UPLOAD_BYTES: 10485760
    ports:
      - "8001:8001"
      - "50051:50051"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8001/health',timeout=2).getcode()==200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [app_net]
    restart: unless-stopped

  mal_log_web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- -H 0.0.0.0 -p 3000"
    volumes:
      - ./mal-log-web:/app
      - mal_log_web_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      auth_service:
        condition: service_healthy
      log_ingestion_service:
        condition: service_healthy
    networks: [app_net]
    restart: unless-stopped

volumes:
  auth_db_data:
  mal_log_web_node_modules:

networks:
  app_net: {}
