name: CI

on:
  push:
  pull_request:

jobs:
  test-express-ts-auth-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth_service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: auth_service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  test-python-log-ingestion-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: log_ingestion_service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: log_ingestion_service/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"
